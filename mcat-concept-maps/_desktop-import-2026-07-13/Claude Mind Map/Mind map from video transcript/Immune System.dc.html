<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<style>
html,body{margin:0;padding:0;background:#fff;}
</style>
</helmet>
<div style="position:relative;width:3400px;height:1500px;background:#fff;font-family:Verdana,Geneva,sans-serif;">
  <div style="position:absolute;left:40px;top:4px;font-size:10px;font-weight:700;color:#9aa3ad;letter-spacing:.08em;">B/B · MCAT BIOLOGY</div>
  <svg width="3400" height="1500" style="position:absolute;left:0;top:0;overflow:visible;pointer-events:none;">
    <defs>
      <marker id="aB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0.5 L7,3 L0,5.5z" fill="#555"></path></marker>
      <marker id="aI" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0.5 L7,3 L0,5.5z" fill="#1a6b42"></path></marker>
      <marker id="aA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0.5 L7,3 L0,5.5z" fill="#2d5a8e"></path></marker>
      <marker id="aGy" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0.5 L7,3 L0,5.5z" fill="#999"></path></marker>
      <marker id="coopD" markerWidth="10" markerHeight="10" refX="4.5" refY="4.5" orient="auto"><path d="M4.5,1 L8,4.5 L4.5,8 L1,4.5 Z" fill="#0f9b8e"></path></marker>
    </defs>
    <sc-for list="{{ bands }}" as="b" hint-placeholder-count="5">
      <rect x="{{ b.x }}" y="{{ b.y }}" width="{{ b.w }}" height="{{ b.h }}" rx="{{ b.rx }}" fill="{{ b.fill }}"></rect>
    </sc-for>
    <sc-for list="{{ wm }}" as="w" hint-placeholder-count="3">
      <path d="{{ w.d }}" fill="{{ w.fill }}" opacity="{{ w.op }}" transform="{{ w.tr }}"></path>
    </sc-for>
    <sc-for list="{{ edges }}" as="e" hint-placeholder-count="50">
      <path d="{{ e.d }}" fill="none" stroke="{{ e.stroke }}" stroke-width="{{ e.sw }}" stroke-dasharray="{{ e.dash }}" marker-end="{{ e.me }}"></path>
    </sc-for>
    <sc-for list="{{ coops }}" as="c" hint-placeholder-count="2">
      <path d="{{ c.d }}" fill="none" stroke="#0f9b8e" stroke-width="1.7" marker-start="url(#coopD)" marker-end="url(#coopD)"></path>
    </sc-for>
    <sc-for list="{{ rects }}" as="r" hint-placeholder-count="70">
      <rect x="{{ r.x }}" y="{{ r.y }}" width="{{ r.w }}" height="{{ r.h }}" rx="{{ r.rx }}" fill="{{ r.fill }}" stroke="{{ r.stroke }}" stroke-width="{{ r.sw }}" stroke-dasharray="{{ r.dash }}"></rect>
    </sc-for>
    <sc-for list="{{ polys }}" as="p" hint-placeholder-count="20">
      <polygon points="{{ p.points }}" fill="{{ p.fill }}" stroke="{{ p.stroke }}" stroke-width="{{ p.sw }}"></polygon>
    </sc-for>
  </svg>
  <sc-for list="{{ nds }}" as="n" hint-placeholder-count="70">
    <div style="{{ n.style }}">
      {{ n.icon }}
      <div style="{{ n.tw }}">
        <sc-for list="{{ n.lines }}" as="ln" hint-placeholder-count="2">
          <div style="{{ ln.s }}"><span style="{{ ln.bs }}">{{ ln.b }}</span><span>{{ ln.t }}</span></div>
        </sc-for>
      </div>
    </div>
  </sc-for>
  <sc-for list="{{ lbls }}" as="l" hint-placeholder-count="20">
    <div style="{{ l.style }}">{{ l.text }}</div>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:3400,&quot;height&quot;:1300}}">

class Component extends DCLogic {
  renderVals() {
    const TH={
      hT:{f:'#2c3e50',s:'#2c3e50',tc:'#fff',sh:'banner'},

      pg:{f:'#4a4a4a',s:'#2e2e2e',tc:'#fff',sh:'rect'}
    };
    // ── LEVEL 0 ──
    const N=[
      ['hIM',1450,30,480,48,'hT',[['IMMUNE SYSTEM',800,16]]],
      // ── LEVEL 1 ──
      ['inn',500,150,300,48,'ci',[['INNATE IMMUNE SYSTEM',800,13]]],

      ['nAd',2250,204,300,28,'nt',[['Specific · slower · has memory',600,9]]],
      // ── LEVEL 2 ──
      ['ncl',250,310,260,40,'sc',[['NONCELLULAR DEFENSES',700,11]]],
      ['cel',1000,310,260,40,'sc',[['CELLS OF INNATE SYSTEM',700,11]]],
      ['hum',2830,310,240,40,'sa',[['HUMORAL IMMUNITY',700,12]]],
      ['nHu',2830,356,240,24,'nt',[['Antibody-mediated (B-cells)',600,8.5]]],
      ['cyt',1770,310,260,40,'sa',[['CELL-MEDIATED',700,12]]],
      ['nCy',1770,356,260,24,'nt',[['T-cell mediated',600,8.5]]],

      ['cmp',40,430,148,50,'lc',[['Complement',700,10]]],
      ['muc',220,430,148,50,'lc',[['Mucous',700,10],['Membranes',700,10]]],

      ['gi',540,430,108,50,'lc',[['GI Tract',700,10]]],
      ['ifn',680,430,138,50,'lc',[['Interferons',700,10]]],

      ['nIf',680,490,138,56,'nt',[['Cytokines from infected cells prevent viral replication in neighboring cells',400,8]]],
      // Level 4: Complement sub

      ['alp',220,590,148,36,'rg',[['Alternative Pathway',700,9]]],
      ['nAl',220,632,148,24,'nt',[['No antibody required',600,8.5]]],
      // ── LEVEL 3: Cells children ──
      ['mac',880,430,160,46,'sc',[['Macrophages',700,11]]],
      ['nMa',880,482,160,56,'nt',[['Phagocytic',600,8.5],['engulf + display on MHC',400,8],['release cytokines',400,8],['antigen-presenting cell',400,8]]],

      ['nNK',1080,482,148,50,'nt',[['Kill infected/cancer cells',600,8.5],['perforin + granzymes',400,8],['innate (no MHC needed)',400,8]]],
      ['grn',1280,430,168,40,'sc',[['Granulocytes',700,11]]],

      ['neu',1180,540,128,42,'sc',[['Neutrophils',700,10]]],

      ['bas',1340,540,118,42,'sc',[['Basophils',700,10]]],
      ['nBa',1340,588,118,42,'nt',[['Inflammatory +',600,8.5],['allergic response',400,8],['release histamine',400,8]]],
      ['eos',1490,540,128,42,'sc',[['Eosinophils',700,10]]],
      ['nEo',1490,588,128,42,'nt',[['Anti-parasitic',600,8.5],['allergic response',400,8],['granule release',400,8]]],
      // ── MHC (under Macrophages) ──

      ['mh2',1040,660,168,44,'mp',[['MHC-II',800,12]]],
      ['nM2',1040,710,168,68,'nt',[['APCs only',700,8.5,'u'],['exogenous pathway',600,8],['(antigens from OUTSIDE)',400,8],['presents to CD4⁺',700,8,'u'],['(helper T-cells)',400,8]]],
      // ── LEVEL 3: Humoral flow ──
      ['agx',2870,430,160,36,'sa',[['Antigen Exposure',700,10]]],
      ['lyb',2881,510,138,36,'sa',[['Lymphoblasts',700,10]]],
      ['bcl',2886,590,128,44,'lc',[['B-Cells',700,11]]],
      ['clb',2876,680,148,36,'sa',[['Clonal B-Cells',700,9]]],
      ['pla',2796,770,148,44,'lc',[['Plasma Cells',700,10]]],
      ['nPl',2796,820,148,42,'nt',[['Secrete antibodies',600,8.5],['effector cells',400,8],['short-lived',400,8]]],
      ['mbc',2956,770,148,44,'lc',[['Memory B-Cells',700,10]]],
      ['nMb',2956,820,148,42,'nt',[['Long-lived',600,8.5],['faster response on',400,8],['re-exposure',400,8]]],
      ['ant',2771,900,358,44,'ds',[['ANTIBODIES (Immunoglobulins)',800,10]]],
      ['nAb',2771,950,358,56,'nt',[['IgG (most abundant · crosses placenta)',600,8.5,'u'],['IgM (first responder · pentamer)',600,8,'u'],['IgA (mucous membranes · secretory)',600,8],['IgE (allergies · parasites) · IgD (B-cell receptor)',600,8]]],
      // ── LEVEL 3: Cell-Mediated children ──
      ['ctc',1740,430,168,48,'lc',[['Cytotoxic T-Cells',700,10],['(CD8⁺)',700,10]]],
      ['nCt',1740,484,168,60,'nt',[['Recognize MHC-I',700,8.5,'u'],['on infected cells',400,8],['perforin + granzymes',400,8],['→ apoptosis',400,8]]],
      ['htc',1740,600,168,48,'lc',[['Helper T-Cells',700,10],['(CD4⁺)',700,10]]],
      ['nHt',1740,654,168,68,'nt',[['Activated by MHC-II',700,8.5,'u'],['on APCs',400,8],['1. Co-stimulate B-cells',600,8],['2. Activate macrophages',600,8],['3. Secrete cytokines',600,8]]],
      ['rtc',1950,430,148,44,'lc',[['Regulatory',700,10],['T-Cells',700,10]]],
      ['nRt',1950,484,148,42,'nt',[['Suppress immune',600,8.5],['response · prevent',400,8],['autoimmunity',400,8]]],
      ['mtc',1950,600,148,44,'lc',[['Memory',700,10],['T-Cells',700,10]]],
      ['nMt',1950,654,148,42,'nt',[['Long-lived',600,8.5],['rapid response on',400,8],['re-exposure',400,8]]],
      // ── Cross-references ──
      ['xBc',2806,634,186,24,'rfT',[['Helper T · co-stim',700,8]]],
      // ── KEY ──
      ['kd',1700,1060,780,54,'ds',[['KEY: Innate = fast · non-specific · no memory     Adaptive = slow · specific · HAS memory',800,10],['Humoral = B-cells + antibodies (extracellular)     Cell-mediated = T-cells (intracellular pathogens)',400,9]]],
      ['nCr',1700,1128,780,36,'nt',[['MHC-I + CD8⁺ = cytotoxic (kill infected cells)     MHC-II + CD4⁺ = helper (coordinate response)',700,9]]]
    ];
    /* ── ICON SYSTEM ── */
    const RC=React.createElement;
    function ic(parts,color,sz){
      const el=(a,i)=>{const k=a[0],b={key:i};
        if(k==='c')return RC('circle',{...b,cx:a[1],cy:a[2],r:a[3],fill:'none',stroke:color,strokeWidth:1.7});
        if(k==='cf')return RC('circle',{...b,cx:a[1],cy:a[2],r:a[3],fill:color});
        if(k==='l')return RC('line',{...b,x1:a[1],y1:a[2],x2:a[3],y2:a[4],stroke:color,strokeWidth:1.7,strokeLinecap:'round'});
        if(k==='p')return RC('path',{...b,d:a[1],fill:'none',stroke:color,strokeWidth:1.7,strokeLinejoin:'round',strokeLinecap:'round'});
        if(k==='pg')return RC('polygon',{...b,points:a[1],fill:'none',stroke:color,strokeWidth:1.7});
        if(k==='t')return RC('text',{...b,x:a[1],y:a[2],fontSize:a[3],fontWeight:800,fill:color,textAnchor:'middle',fontFamily:'Verdana'},a[4]);
        return null;};
      return RC('svg',{width:sz,height:sz,viewBox:'0 0 24 24',style:{flexShrink:0,display:'block'}},parts.map(el));
    }
    const IC={
      shield:[['p','M12 2 L20 5 V11 C20 16 16 20 12 22 C8 20 4 16 4 11 V5 Z']],
      barrier:[['p','M4 6 H20 V18 H4 Z'],['l',4,12,20,12],['l',12,6,12,12],['l',8,12,8,18],['l',16,12,16,18]],
      cell:[['c',12,12,8],['cf',14,11,2.5]],
      pore:[['c',12,12,6],['cf',18,12,1.5],['cf',15,17.2,1.5],['cf',9,17.2,1.5],['cf',6,12,1.5],['cf',9,6.8,1.5],['cf',15,6.8,1.5]],
      droplet:[['p','M12 3 C12 3 6 11 6 15 A6 6 0 0 0 18 15 C18 11 12 3 12 3 Z']],
      skin:[['l',5,8,19,8],['l',5,12,19,12],['l',5,16,19,16],['cf',9,10,0.9],['cf',14,14,0.9]],
      stomach:[['p','M10 4 C10 7 9 8 12 9 C17 10 18 16 13 18 C10 19 9 16 9 14']],
      virus:[['c',12,12,5],['l',12,7,12,3],['l',12,17,12,21],['l',7,12,3,12],['l',17,12,21,12],['l',8.5,8.5,6,6],['l',15.5,8.5,18,6],['l',8.5,15.5,6,18],['l',15.5,15.5,18,18]],
      bact:[['p','M6 9 h7 a3 3 0 0 1 0 6 h-7 a3 3 0 0 1 0 -6 Z'],['p','M16 12 q4 -1 4 -5'],['cf',9,12,0.9],['cf',12,12,0.9]],
      worm:[['p','M5 17 C4 11 10 11 12 14 C14 17 20 16 19 9'],['cf',19,8.6,1.3]],
      amoeba:[['p','M6 10 C4 6 9 3 12 5 C15 3 20 6 18 10 C22 12 20 18 15 17 C13 21 8 20 8 16 C3 16 3 11 6 10 Z'],['cf',12,12,2]],
      nk:[['c',12,12,8],['c',9.5,10,3],['cf',15,13,1],['cf',13,16,1],['cf',16,10,1]],
      granulo:[['c',12,12,8],['cf',9,10,1.2],['cf',14,9,1.2],['cf',15,14,1.2],['cf',10,15,1.2],['cf',12,12,1.2]],
      neutro:[['c',12,12,8],['c',10,10,2],['c',14,10,2],['c',12,14,2]],
      baso:[['c',12,12,8],['cf',10,11,2],['cf',14,12,2],['cf',12,15,1.6]],
      eosino:[['c',12,12,8],['c',9,12,2.2],['c',15,12,2.2],['cf',12,9,1],['cf',12,15,1]],
      mhc:[['p','M7 7 V14 A5 5 0 0 0 17 14 V7'],['l',7,7,17,7],['cf',12,6,1.6]]
    };
    const ICN={
      cmp:'pore',muc:'droplet',skn:'skin',gi:'stomach',ifn:'virus',
      mac:'amoeba',nkc:'nk',grn:'granulo',neu:'neutro',bas:'baso',eos:'eosino',hMH:'mhc',
      pBac:'bact',pVir:'virus',pPar:'worm'
    };
    /* ── BUILD SHAPES + TEXT ── */
    const dict={},rects=[],polys=[],nds=[];
    N.forEach(([id,x,y,w,h,tk,lns])=>{
      const T=TH[tk]; dict[id]={x,y,w,h};
      const sw=(tk==='nt')?1.2:(tk==='hT')?0:1.5;
      const da=tk==='nt'?'5 3':'';
      if(T.sh==='pill') rects.push({x,y,w,h,rx:h/2,fill:T.f,stroke:T.s,sw,dash:da});
      else if(T.sh==='rect') rects.push({x,y,w,h,rx:5,fill:T.f,stroke:T.s,sw,dash:da});
      else if(T.sh==='banner') rects.push({x,y,w,h,rx:14,fill:T.f,stroke:T.f,sw:0,dash:''});
      else if(T.sh==='note') rects.push({x,y,w,h,rx:10,fill:T.f,stroke:T.s,sw,dash:da});
      else if(T.sh==='oct'){const c=Math.min(8,w/5,h/3);polys.push({points:`${x+c},${y} ${x+w-c},${y} ${x+w},${y+c} ${x+w},${y+h-c} ${x+w-c},${y+h} ${x+c},${y+h} ${x},${y+h-c} ${x},${y+c}`,fill:T.f,stroke:T.s,sw:1.5});}
      else if(T.sh==='hex'){const i=Math.min(14,h/2);polys.push({points:`${x+i},${y} ${x+w-i},${y} ${x+w},${y+h/2} ${x+w-i},${y+h} ${x+i},${y+h} ${x},${y+h/2}`,fill:T.f,stroke:T.s,sw:1.5});}
      else if(T.sh==='diamond') polys.push({points:`${x+w/2},${y} ${x+w},${y+h/2} ${x+w/2},${y+h} ${x},${y+h/2}`,fill:T.f,stroke:T.s,sw:1.5});
      else if(T.sh==='chip'){const ph=10;polys.push({points:`${x+ph},${y} ${x+w},${y} ${x+w},${y+h} ${x+ph},${y+h} ${x},${y+h/2}`,fill:T.f,stroke:T.s,sw:1.3});}
      let iconEl=null;
      if(ICN[id]){const isz=Math.max(16,Math.min(h-16,26));iconEl=ic(IC[ICN[id]],T.tc,isz);}
      const isNote=(tk==='nt');
      const multi=lns.length>1;
      const hasHeader=isNote&&multi&&lns[0][1]>=600&&lns.some(l=>l[1]<600);
      const leftAlign=isNote&&multi;
      const chip=(T.sh==='chip');
      nds.push({
        style:`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;box-sizing:border-box;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:${iconEl?5:0}px;padding:1px ${leftAlign?6:3}px 1px ${chip?15:(leftAlign?6:3)}px;color:${T.tc};pointer-events:none;`,
        tw:leftAlign
          ?'display:flex;flex-direction:column;align-items:flex-start;justify-content:center;text-align:left;min-width:0;width:100%;'
          :'display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-width:0;',
        icon:iconEl,
        lines:lns.map(([t,fw,fs,st],li)=>{
          let bullet='';
          if(isNote&&multi){
            const numbered=/^\d+\./.test(t);
            const headerLine=hasHeader&&li===0;
            if(!headerLine&&!numbered) bullet='•';
          }
          const paren=/^\(.*\)$/.test(String(t).trim());
          const ital=paren||/i/.test(st||'');
          const und=/u/.test(st||'');
          let base=`font-weight:${fw};font-size:${fs}px;line-height:1.35;`;
          if(ital) base+='font-style:italic;';
          if(und) base+='text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px;';
          return {t,b:bullet,bs:bullet?'flex-shrink:0;margin-right:3px;':'display:none;',s:bullet?base+'display:flex;align-items:baseline;':base};
        })
      });
    });
    /* ── EDGES: [from, to, type, label?, dir?] ── */
    /* dir: 'd'=down (default), 'r'=right, 'l'=left */
    const ET={
      f:{stroke:'#555',sw:1.3,dash:'',me:'url(#aB)'},
      i:{stroke:'#1a6b42',sw:1.3,dash:'',me:'url(#aI)'},
      a:{stroke:'#2d5a8e',sw:1.3,dash:'',me:'url(#aA)'},
      s:{stroke:'#999',sw:1,dash:'4 4',me:'url(#aGy)'}
    };
    const ED=[
      ['hIM','inn','f'],['hIM','adp','f'],
      ['inn','ncl','i'],['inn','cel','i'],
      ['ncl','cmp','i'],['ncl','muc','i'],['ncl','skn','i'],['ncl','gi','i'],['ncl','ifn','i'],
      ['cmp','clp','s'],['cmp','alp','s'],
      ['cel','mac','i'],['cel','nkc','i'],['cel','grn','i'],
      ['grn','neu','i'],['grn','bas','i'],['grn','eos','i'],
      ['mac','hMH','s','displays'],
      ['hMH','mh1','s'],['hMH','mh2','s'],
      ['adp','hum','a'],['adp','cyt','a'],
      ['hum','agx','a'],['agx','lyb','a'],['lyb','bcl','a'],
      ['bcl','clb','a'],['clb','pla','a'],['clb','mbc','a'],
      ['pla','ant','a','secrete'],
      ['cyt','htc','a'],['cyt','ctc','a'],
      ['cyt','rtc','a'],['cyt','mtc','a']
    ];
    const edges=[],lbls=[];
    ED.forEach(([fi,ti,tp,lbl,dir])=>{
      const A=dict[fi],B=dict[ti]; if(!A||!B) return;
      let sx,sy,ex,ey;
      if(dir==='r'){
        sx=A.x+A.w; sy=A.y+A.h/2; ex=B.x; ey=B.y+B.h/2;
      } else if(dir==='l'){
        sx=A.x; sy=A.y+A.h/2; ex=B.x+B.w; ey=B.y+B.h/2;
      } else {
        // Default: exit bottom center → enter top center
        sx=A.x+A.w/2; sy=A.y+A.h; ex=B.x+B.w/2; ey=B.y;
      }
      const d=`M${sx},${sy}L${ex},${ey}`;
      const t=ET[tp];
      edges.push({d,stroke:t.stroke,sw:t.sw,dash:t.dash,me:t.me});
      if(lbl){
        const lx=(sx+ex)/2,ly=(sy+ey)/2;
        lbls.push({text:lbl,style:`position:absolute;left:${lx}px;top:${ly}px;transform:translate(-50%,-50%);background:#fff;border:1px solid #ddd;border-radius:3px;padding:1px 5px;font-size:7.5px;font-weight:600;color:#666;white-space:nowrap;`});
      }
    });
    /* ── BANDS ── */
    const bands=[
      {x:18,y:18,w:3364,h:68,rx:12,fill:'#e8ecf0'},
      {x:18,y:100,w:1640,h:580,rx:12,fill:'#e5f5ec'},
      {x:800,y:580,w:500,h:230,rx:10,fill:'#ede5f5'},
      {x:1680,y:100,w:1702,h:980,rx:12,fill:'#e0eaf5'},
      {x:1680,y:1040,w:820,h:140,rx:10,fill:'#f5f3ed'}
    ];
    /* ── LEGEND ── */
    const ly=1210;
    [
      ['LEGEND',800,11,'#3d3520',42,ly,'.06em'],
      ['⬭ system     ▭ cell type     ⬡ specific cell     ◆ key concept     ⬭ purple = MHC     ┈┈ note/cross-ref',600,9,'#5a4e2a',42,ly+22,''],
      ['──▶ green = innate     ──▶ blue = adaptive     ◆──◆ teal = MHC↔T-cell cooperation     ▷ gold chip = cross-reference     underline = high-yield',600,9,'#5a4e2a',42,ly+42,'']
    ].forEach(([t,fw,fs,c,x,y,ls])=>lbls.push({text:t,style:`position:absolute;left:${x}px;top:${y}px;font-weight:${fw};font-size:${fs}px;color:${c};white-space:nowrap;${ls?'letter-spacing:'+ls+';':''}`}));
    /* ── COOPERATION LINES (MHC ↔ T-cell, no hierarchy) ── */
    const coops=[
      {d:'M1008,674 L1008,648 L1652,648 L1652,460 L1740,460'},
      {d:'M1208,682 L1208,668 L1672,668 L1672,624 L1740,624'}
    ];
    [['MHC-I presents → CD8⁺',1330,638],['MHC-II presents → CD4⁺',1440,658]].forEach(([t,lx,ly])=>{
      lbls.push({text:t,style:`position:absolute;left:${lx}px;top:${ly}px;transform:translate(-50%,-50%);background:#fff;border:1px solid #0f9b8e;border-radius:3px;padding:1px 5px;font-size:7.5px;font-weight:700;color:#0b6f66;white-space:nowrap;`});
    });
    /* ── WATERMARK SILHOUETTES ── */
    const wm=[
      {d:'M6 10 C4 6 9 3 12 5 C15 3 20 6 18 10 C22 12 20 18 15 17 C13 21 8 20 8 16 C3 16 3 11 6 10 Z',fill:'#1a6b42',op:0.05,tr:'translate(1180,120) scale(24)'}
    ];
    return {bands,edges,rects,polys,nds,lbls,wm,coops};
  }
}
