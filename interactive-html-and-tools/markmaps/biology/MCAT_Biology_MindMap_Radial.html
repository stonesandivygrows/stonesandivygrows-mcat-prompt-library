  const r=RING[d.level]||(535+(d.level-5)*75);
  const a=(a0+a1)/2;
  nm[d.id]={d,a,r,x:Math.cos(a)*r,y:Math.sin(a)*r};
  if(coll.has(d.id)||!d.children.length)return;
  const tot=d.children.reduce((s,c)=>s+leaves(c),0);
  let aa=a0;
  for(const ch of d.children){
    const span=(a1-a0)*leaves(ch)/tot;
    layout(ch,aa,aa+span);
    aa+=span;
  }
}

function doLayout(){
  nm={};
  const sec=DATA.children,n=sec.length;
  for(let i=0;i<n;i++){
    layout(sec[i],(2*Math.PI/n)*i-Math.PI/2,(2*Math.PI/n)*(i+1)-Math.PI/2);
  }
}

function parentOf(data){
  for(const[,n] of Object.entries(nm)){
    if(n.d.children.some(c=>c.id===data.id))return n.d;
  }
  return null;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const[ocx,ocy]=w2s(0,0);

  // center halo
  const g=ctx.createRadialGradient(ocx,ocy,8*sc,ocx,ocy,52*sc);
  g.addColorStop(0,'rgba(60,70,190,.2)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(ocx,ocy,52*sc,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();

  // center circle
  ctx.beginPath();ctx.arc(ocx,ocy,40*sc,0,Math.PI*2);
  ctx.fillStyle='#0c0f1e';ctx.fill();
  ctx.strokeStyle='#3038a0';ctx.lineWidth=1.5*sc;ctx.stroke();
  ctx.fillStyle='#7078c8';
  ctx.font='600 '+(Math.round(10*sc))+'px "Segoe UI",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('MCAT',ocx,ocy-7*sc);
  ctx.fillText('Biology',ocx,ocy+6*sc);

  // spokes center -> L2
  for(const s of DATA.children){
    const sn=nm[s.id];if(!sn)continue;
    const[sx,sy]=w2s(sn.x,sn.y);
    ctx.beginPath();ctx.moveTo(ocx,ocy);ctx.lineTo(sx,sy);
    ctx.strokeStyle='#181c50';ctx.lineWidth=1.1*sc;ctx.stroke();
  }

  // edges between nodes
  for(const[,n] of Object.entries(nm)){
    const p=parentOf(n.d);if(!p)continue;
    const pn=nm[p.id];if(!pn)continue;
    const[px,py]=w2s(pn.x,pn.y);
    const[nx,ny]=w2s(n.x,n.y);
    const dx=nx-px,dy=ny-py,dist=Math.hypot(dx,dy)||1;
    const pr=(NR[p.level]||12)*sc,nr=(NR[n.d.level]||10)*sc;
    ctx.beginPath();
    ctx.moveTo(px+dx/dist*pr,py+dy/dist*pr);
    ctx.lineTo(nx-dx/dist*nr,ny-dy/dist*nr);
    ctx.strokeStyle=LC[n.d.level]||'#1a1a2a';
    ctx.lineWidth=(n.d.level===2?1.3:n.d.level===3?0.9:0.6)*sc;
    ctx.stroke();
  }

  updateLabels();
}

function clean(t){
  return t.replace(/[\u{1F300}-\u{1FFFF}\u2600-\u27BF]/gu,'').trim();
}

function updateLabels(){
  const vis=new Set(Object.keys(nm));
  for(const id of Object.keys(lbls)){
    if(!vis.has(id)){lbls[id].remove();delete lbls[id];}
  }
  for(const[id,n] of Object.entries(nm)){
    let el=lbls[id];
    if(!el){
      el=document.createElement('div');
      el.className='nd';
      el.addEventListener('click',e=>{e.stopPropagation();handleClick(id);});
      el.addEventListener('dblclick',e=>{e.stopPropagation();if(editMode)startEdit(el,n.d);});
      ov.appendChild(el);lbls[id]=el;
    }
    const[sx,sy]=w2s(n.x,n.y);
    const r=(NR[n.d.level]||12)*sc;
    const hit=hits.has(id);
    el.style.left=sx+'px';el.style.top=sy+'px';
    el.style.width=(r*2)+'px';el.style.height=(r*2)+'px';
    el.style.background=FILL[n.d.level]||'#0c0c14';
    el.style.border=(Math.max(1,1.1*sc))+'px solid '+(hit?'#ffcc00':STROKE[n.d.level]||'#222');
    el.style.boxShadow=hit?('0 0 10px #ffcc00'):(n.d.level===2?'0 0 '+(7*sc)+'px '+STROKE[2]+'55':'none');
    const hasC=n.d.children.length>0,isColl=coll.has(id);
    const fs=Math.max(6,Math.min(9,r*0.35));
    const raw=clean(n.d.text);
    const mc=Math.max(5,Math.floor(r*1.0));
    const disp=raw.length>mc?raw.slice(0,mc)+'&#x2026;':raw;
    const arr=hasC?('<br><span style="opacity:.4;font-size:'+(fs-1)+'px">'+(isColl?'&#x25B8;':'&#x25BE;')+'</span>'):'';
    el.innerHTML='<span style="font-size:'+fs+'px;color:'+TC[n.d.level]+';max-width:'+(r*1.85)+'px;overflow:hidden">'+disp+arr+'</span>';
    el.title=n.d.text;
  }
}

function handleClick(id){
  const n=nm[id];if(!n||!n.d.children.length)return;
  if(coll.has(id))coll.delete(id);else coll.add(id);
  doLayout();draw();
}

let pan={on:false,lx:0,ly:0};
canvas.addEventListener('mousedown',e=>{pan={on:true,lx:e.clientX,ly:e.clientY};canvas.classList.add('pan');});
window.addEventListener('mousemove',e=>{
  if(!pan.on)return;
  cx-=(e.clientX-pan.lx)/sc;cy-=(e.clientY-pan.ly)/sc;
  pan.lx=e.clientX;pan.ly=e.clientY;draw();
});
window.addEventListener('mouseup',()=>{pan.on=false;canvas.classList.remove('pan');});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.91;
  const[wx,wy]=s2w(e.clientX,e.clientY-42);
  sc=Math.min(5,Math.max(0.08,sc*f));
  const[nsx,nsy]=w2s(wx,wy);
  cx+=(nsx-e.clientX)/sc;cy+=(nsy-(e.clientY-42))/sc;
  draw();
},{passive:false});

function resetView(){cx=0;cy=0;sc=1;draw();}

function toggleEdit(){
  editMode=!editMode;
  document.getElementById('eBtn').classList.toggle('on',editMode);
  document.getElementById('hint').textContent=editMode
    ?'Double-click any node to rename it'
    :'Scroll to zoom · Drag to pan · Click to expand/collapse · Double-click to edit (edit mode)';
}

function startEdit(el,data){
  const orig=data.text;
  const inp=document.createElement('input');
  inp.value=data.text;
  inp.style.cssText='width:86%;font-size:9px;background:#080a18;border:1px solid #484eb0;color:#9098e8;border-radius:3px;padding:2px 3px;text-align:center;outline:none';
  el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();
  inp.addEventListener('blur',()=>{data.text=inp.value.trim()||orig;doLayout();draw();},{once:true});
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){data.text=orig;inp.blur();}
  });
}

function doSearch(q){
  hits.clear();
  if(!q.trim()){draw();return;}
  const lo=q.toLowerCase();
  for(const[id,n] of Object.entries(nm)){
    if(n.d.text.toLowerCase().includes(lo)){
      hits.add(id);
      let p=parentOf(n.d);
      while(p){coll.delete(p.id);p=parentOf(p);}
    }
  }
  doLayout();draw();
}

function expandAll(){coll.clear();doLayout();draw();}
function collapseToSections(){
  function deep(d){coll.add(d.id);d.children.forEach(deep);}
  DATA.children.forEach(s=>s.children.forEach(deep));
  doLayout();draw();
}

function exportMD(){
  function md(d,dep){
    let s='#'.repeat(Math.min(dep,6))+' '+d.text+'\n\n';
    d.children.forEach(c=>{s+=md(c,dep+1);});return s;
  }
  let s='# Captain Hook MCAT Biology Deck\n\n';
  DATA.children.forEach(c=>{s+=md(c,2);});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([s],{type:'text/markdown'}));
  a.download='MCAT_Biology_MindMap.md';a.click();
}

function initC(d){if(d.level>=3)coll.add(d.id);d.children.forEach(initC);}
DATA.children.forEach(initC);
resize();doLayout();draw();
</script>
</body>
</html>
