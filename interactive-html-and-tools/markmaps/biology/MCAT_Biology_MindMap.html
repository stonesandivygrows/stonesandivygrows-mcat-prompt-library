<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captain Hook MCAT Biology Mind Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e8e8f0;height:100vh;overflow:hidden}
#toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:#1a1d2e;border-bottom:1px solid #2a2d42;display:flex;align-items:center;gap:8px;padding:0 16px;z-index:100}
#toolbar h1{font-size:14px;font-weight:600;color:#c8caf0;margin-right:8px;white-space:nowrap}
.tb-btn{background:#23263a;border:1px solid #2a2d42;color:#a0a2c0;font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .15s}
.tb-btn:hover{background:#2d3050;color:#e0e2f0;border-color:#4a4d70}
.tb-btn.active{background:#3d4070;color:#c0c4ff;border-color:#5a5eaa}
#search-wrap{margin-left:auto;display:flex;align-items:center;gap:6px}
#search{background:#23263a;border:1px solid #2a2d42;color:#e0e2f0;font-size:12px;padding:5px 10px;border-radius:6px;width:180px;outline:none}
#search:focus{border-color:#5a5eaa}
#search::placeholder{color:#555870}
#canvas-wrap{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas-wrap.grabbing{cursor:grabbing}
#canvas{position:absolute;transform-origin:0 0}

/* Node styles */
.node{position:absolute;user-select:none}
.node-box{border-radius:8px;cursor:pointer;transition:box-shadow .15s,transform .15s;position:relative}
.node-box:hover{transform:translateY(-1px)}

/* Level colors */
.lv2 .node-box{background:#1e2240;border:1.5px solid #4a4eaa;color:#b8bcff;font-size:13px;font-weight:600;padding:8px 14px;min-width:180px;max-width:220px;text-align:center}
.lv2 .node-box:hover{box-shadow:0 0 12px #4a4eaa88;border-color:#7a7ecc}
.lv3 .node-box{background:#1a2330;border:1px solid #2a5060;color:#7ecfea;font-size:12px;font-weight:500;padding:6px 12px;min-width:140px;max-width:190px}
.lv3 .node-box:hover{box-shadow:0 0 8px #2a506080;border-color:#4a7090}
.lv4 .node-box{background:#1a2220;border:1px solid #1e4030;color:#7ecfa0;font-size:11px;padding:5px 10px;min-width:120px;max-width:170px}
.lv4 .node-box:hover{box-shadow:0 0 6px #1e403060}
.lv5 .node-box{background:#1e1e28;border:1px solid #3a2a50;color:#c0a0e0;font-size:11px;padding:4px 9px;min-width:100px;max-width:160px}

.node-box.collapsed::after{content:'▸';position:absolute;right:6px;top:50%;transform:translateY(-50%);opacity:.6;font-size:10px}
.node-box.expanded::after{content:'▾';position:absolute;right:6px;top:50%;transform:translateY(-50%);opacity:.6;font-size:10px}

.node-box.editing{outline:2px solid #7a7ecc;background:#22254a}
.node-box[contenteditable=true]{cursor:text}

.node-box.highlight{box-shadow:0 0 0 2px #ffd700 !important;border-color:#ffd700 !important}

/* SVG connector layer */
#connectors{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.conn{stroke:#2a3050;stroke-width:1.5;fill:none;opacity:.7}
.conn.lv2{stroke:#3a3e7a;stroke-width:2}
.conn.lv3{stroke:#2a5060;stroke-width:1.5}
.conn.lv4{stroke:#1e4030;stroke-width:1}
.conn.lv5{stroke:#3a2a50;stroke-width:1}

/* Add node button */
.add-child{display:none;position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);background:#3d4070;border:1px solid #5a5eaa;color:#c0c4ff;font-size:10px;padding:2px 7px;border-radius:10px;cursor:pointer;z-index:10;white-space:nowrap}
.node:hover .add-child{display:block}
.add-child:hover{background:#4d5090}

#hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:#444870;pointer-events:none;white-space:nowrap}
</style>
</head>

// ── State ──────────────────────────────────────────────────────────────
let nodes = {};       // id → {data, el, x, y, w, h, parentId}
let collapsed = new Set();
let editMode = false;
let transform = {x: 60, y: 80, scale: 1};
let drag = {active:false, startX:0, startY:0, ox:0, oy:0};

const canvas = document.getElementById('canvas');
const svgEl  = document.getElementById('connectors');
const wrap   = document.getElementById('canvas-wrap');

// ── Colors / level config ──────────────────────────────────────────────
const LV_W = {2:200, 3:175, 4:160, 5:150};
const LV_GAP_X = {2:60, 3:50, 4:40, 5:35};
const LV_GAP_Y = {2:18, 3:12, 4:8, 5:6};

// ── Build DOM ──────────────────────────────────────────────────────────
function buildNodes(data, parentId) {
  const el = document.createElement('div');
  el.className = `node lv${data.level || 1}`;
  el.id = 'nd-' + data.id;

  const box = document.createElement('div');
  box.className = 'node-box' + (data.children.length ? ' collapsed' : '');
  box.textContent = data.text;
  box.dataset.id = data.id;
  box.addEventListener('click', e => { e.stopPropagation(); handleClick(data.id); });
  box.addEventListener('dblclick', e => { e.stopPropagation(); if(editMode) startEdit(box, data); });
  el.appendChild(box);

  if(data.children.length || editMode) {
    const addBtn = document.createElement('button');
    addBtn.className = 'add-child';
    addBtn.textContent = '+ child';
    addBtn.addEventListener('click', e => { e.stopPropagation(); addChild(data.id); });
    el.appendChild(addBtn);
  }

  canvas.appendChild(el);
  nodes[data.id] = {data, el, box, x:0, y:0, w:LV_W[data.level]||160, h:30, parentId};

  for(const child of data.children) buildNodes(child, data.id);
}

function handleClick(id) {
  const n = nodes[id];
  if(!n.data.children.length) return;
  if(collapsed.has(id)) collapsed.delete(id);
  else collapsed.add(id);
  layout();
  drawConnectors();
}

// ── Layout ─────────────────────────────────────────────────────────────
function isVisible(id) {
  const n = nodes[id];
  if(!n.parentId) return true;
  if(collapsed.has(n.parentId)) return false;
  return isVisible(n.parentId);
}

function subtreeHeight(data) {
  if(collapsed.has(data.id) || !data.children.length) {
    return nodeHeight(data);
  }
  const gap = LV_GAP_Y[data.level] || 8;
  let total = 0;
  for(let i=0; i<data.children.length; i++) {
    total += subtreeHeight(data.children[i]);
    if(i < data.children.length-1) total += gap;
  }
  return Math.max(total, nodeHeight(data));
}

function nodeHeight(data) {
  const lv = data.level;
  return lv===2?38:lv===3?32:lv===4?28:25;
}

function layoutNode(data, x, y) {
  const n = nodes[data.id];
  if(!n) return;
  n.x = x; n.y = y;
  n.el.style.left = x+'px';
  n.el.style.top  = y+'px';
  n.el.style.display = isVisible(data.id) ? 'block' : 'none';

  const box = n.box;
  box.className = 'node-box' + (data.children.length ? (collapsed.has(data.id) ? ' collapsed' : ' expanded') : '');

  if(collapsed.has(data.id) || !data.children.length) return;

  const gapX = LV_GAP_X[data.level] || 50;
  const gapY = LV_GAP_Y[data.level] || 8;
  const cx = x + (LV_W[data.level]||160) + gapX;

  // vertically center children around current node
  const totalH = data.children.reduce((s,c,i)=>s+subtreeHeight(c)+(i<data.children.length-1?gapY:0),0);
  const midY = y + nodeHeight(data)/2;
  let cy = midY - totalH/2;

  for(const child of data.children) {
    const ch = subtreeHeight(child);
    layoutNode(child, cx, cy + (ch - nodeHeight(child))/2);
    cy += ch + gapY;
  }
}

function layout() {
  const root = TREE;
  // Layout each L2 section top-to-bottom with spacing
  let y = 0;
  for(const section of root.children) {
    const h = subtreeHeight(section);
    layoutNode(section, 0, y);
    y += h + 40;
  }
}

// ── Connectors ─────────────────────────────────────────────────────────
function drawConnectors() {
  svgEl.innerHTML = '';
  for(const [id, n] of Object.entries(nodes)) {
    if(!n.parentId || !isVisible(id)) continue;
    const p = nodes[n.parentId];
    if(!p || !isVisible(n.parentId)) continue;

    const x1 = p.x + (LV_W[p.data.level]||160);
    const y1 = p.y + nodeHeight(p.data)/2;
    const x2 = n.x;
    const y2 = n.y + nodeHeight(n.data)/2;
    const mx = (x1+x2)/2;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('class', `conn lv${n.data.level}`);
    svgEl.appendChild(path);
  }
}

// ── Pan & Zoom ─────────────────────────────────────────────────────────
function applyTransform() {
  canvas.style.transform = `translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`;
  svgEl.style.transform  = `translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`;
}

wrap.addEventListener('mousedown', e => {
  if(e.target.closest('.node-box,.add-child')) return;
  drag = {active:true, startX:e.clientX, startY:e.clientY, ox:transform.x, oy:transform.y};
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if(!drag.active) return;
  transform.x = drag.ox + (e.clientX - drag.startX);
  transform.y = drag.oy + (e.clientY - drag.startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { drag.active=false; wrap.classList.remove('grabbing'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.909;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  transform.x = mx - (mx - transform.x) * factor;
  transform.y = my - (my - transform.y) * factor;
  transform.scale = Math.min(3, Math.max(0.15, transform.scale * factor));
  applyTransform();
}, {passive:false});

function resetView() {
  transform = {x:60, y:80, scale:1};
  applyTransform();
}

// ── Edit ───────────────────────────────────────────────────────────────
function toggleEdit() {
  editMode = !editMode;
  document.getElementById('editToggle').classList.toggle('active', editMode);
  document.getElementById('hint').textContent = editMode
    ? 'Edit mode: double-click node to rename · click "+ child" to add · Delete key to remove'
    : 'Scroll to zoom · Drag to pan · Click node to expand/collapse · Double-click to edit';
  // Show/hide add buttons
  document.querySelectorAll('.add-child').forEach(b => b.style.display = editMode ? '' : '');
}

function startEdit(box, data) {
  box.contentEditable = 'true';
  box.classList.add('editing');
  box.focus();
  const range = document.createRange();
  range.selectNodeContents(box);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  function finish() {
    box.contentEditable = 'false';
    box.classList.remove('editing');
    data.text = box.textContent.trim() || data.text;
    box.textContent = data.text;
  }
  box.addEventListener('blur', finish, {once:true});
  box.addEventListener('keydown', e => {
    if(e.key==='Enter'){ e.preventDefault(); box.blur(); }
    if(e.key==='Escape'){ box.textContent=data.text; box.blur(); }
    if(e.key==='Delete' && e.metaKey){ deleteNode(data.id); }
  }, {once:false});
}

let nodeCounter = 10000;
function addChild(parentId) {
  const parent = nodes[parentId];
  if(!parent) return;
  nodeCounter++;
  const childLevel = Math.min((parent.data.level||2)+1, 5);
  const newNode = {text:'New node', children:[], level:childLevel, id:'u'+nodeCounter};
  parent.data.children.push(newNode);
  if(collapsed.has(parentId)) collapsed.delete(parentId);
  buildNodes(newNode, parentId);
  layout();
  drawConnectors();
  // auto-start edit
  setTimeout(()=>{ const n=nodes[newNode.id]; if(n) startEdit(n.box, newNode); }, 50);
}

function deleteNode(id) {
  const n = nodes[id];
  if(!n || !n.parentId) return;
  const parent = nodes[n.parentId];
  parent.data.children = parent.data.children.filter(c=>c.id!==id);
  // Remove all descendants
  function remove(data) {
    for(const c of data.children) remove(c);
    const nd = nodes[data.id];
    if(nd) { nd.el.remove(); delete nodes[data.id]; }
  }
  remove(n.data);
  layout(); drawConnectors();
}

// ── Search ─────────────────────────────────────────────────────────────
function doSearch(q) {
  document.querySelectorAll('.node-box').forEach(b => b.classList.remove('highlight'));
  if(!q.trim()) return;
  const lower = q.toLowerCase();
  for(const [id, n] of Object.entries(nodes)) {
    if(n.data.text.toLowerCase().includes(lower)) {
      n.box.classList.add('highlight');
      // Ensure visible
      let pid = n.parentId;
      while(pid) {
        collapsed.delete(pid);
        pid = nodes[pid]?.parentId;
      }
    }
  }
  layout(); drawConnectors();
}

// ── Expand / Collapse ──────────────────────────────────────────────────
function expandAll() {
  collapsed.clear();
  layout(); drawConnectors();
}
function collapseAll() {
  TREE.children.forEach(s => { collapsed.add(s.id); s.children.forEach(c=>collapsed.add(c.id)); });
  layout(); drawConnectors();
}

// ── Export ─────────────────────────────────────────────────────────────
function exportMD() {
  function toMD(data, depth) {
    const prefix = '#'.repeat(Math.min(depth, 6));
    let md = `${prefix} ${data.text}\n\n`;
    for(const c of data.children) md += toMD(c, depth+1);
    return md;
  }
  let md = `# Captain Hook MCAT Biology Deck 🧬🧠\n\n`;
  for(const s of TREE.children) md += toMD(s, 2);
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'MCAT_Biology_MindMap.md';
  a.click();
}

// ── Init ───────────────────────────────────────────────────────────────
for(const section of TREE.children) {
  buildNodes(section, null);
  // Start sections collapsed at L3+
  section.children.forEach(c => collapsed.add(c.id));
}
layout();
drawConnectors();
applyTransform();
</script>
</body>
