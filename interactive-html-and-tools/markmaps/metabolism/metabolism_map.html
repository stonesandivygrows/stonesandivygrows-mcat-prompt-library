<script>
const DESC = {
  hypothalamus:{cat:'CNS/Behavioral',desc:'Master energy homeostasis integrator. Receives: leptin (‚Üë satiety), ghrelin (‚Üë hunger), CCK/PYY (satiety), glucose, insulin. Two opposing neuron populations: orexigenic NPY/AgRP and anorexigenic POMC/CART. Also drives stress axis (CRH) and sympathetic NS.'},
  npy_agrp:{cat:'CNS/Behavioral',desc:'Orexigenic neurons. NPY = neuropeptide Y; AgRP = agouti-related peptide (MC4R inverse agonist). Stimulated by ghrelin; inhibited by leptin and insulin. Drive food-seeking behavior. Fasting markedly increases NPY/AgRP activity.'},
  pomc_cart:{cat:'CNS/Behavioral',desc:'Anorexigenic neurons. POMC ‚Üí Œ±-MSH ‚Üí activates MC4R ‚Üí ‚Üì appetite. CART suppresses feeding. Activated by leptin; inhibited by ghrelin. Target of leptin signaling in obesity.'},
  ghrelin_beh:{cat:'CNS/Behavioral',desc:'Orexigenic peptide from gastric fundus. The only known circulating hunger hormone. Rises pre-meal, falls post-meal. Activates NPY/AgRP. Also stimulates GH release from anterior pituitary.'},
  leptin_beh:{cat:'CNS/Behavioral',desc:'Adipokine proportional to fat mass. Signals satiety to hypothalamus ‚Äî activates POMC/CART, inhibits NPY/AgRP. Leptin resistance (not leptin deficiency) causes common obesity. Also activates AMPK peripherally.'},
  cck_beh:{cat:'CNS/Behavioral',desc:'CCK from I-cells of SI. Fat+protein ‚Üí CCK release. Satiety via vagal afferents to hypothalamus. Also acts locally (‚Üë pancreatic enzymes, GB contraction). Short-term satiety signal.'},
  pyy_beh:{cat:'CNS/Behavioral',desc:'PYY from L-cells of ileum/colon. Released proportional to calories. Acts on hypothalamus to suppress appetite. Works with GLP-1 for post-meal satiety. Important bariatric surgery mechanism.'},
  crh:{cat:'Stress Axis',desc:'Corticotropin-releasing hormone from hypothalamic PVN. Released under stress ‚Üí anterior pituitary ‚Üí ACTH ‚Üí cortisol. CRH also activates sympathetic NS directly.'},
  anterior_pit:{cat:'Stress Axis',desc:'Secretes ACTH in response to CRH. ACTH travels via blood to adrenal cortex ‚Üí stimulates cortisol synthesis (cAMP-PKA pathway).'},
  acth:{cat:'Stress Axis',desc:'Adrenocorticotropic hormone. Binds MC2R on adrenal zona fasciculata ‚Üí cortisol synthesis. Part of the HPA (hypothalamic-pituitary-adrenal) axis.'},
  adrenal_cortex:{cat:'Stress Axis',desc:'Zona fasciculata responds to ACTH ‚Üí cortisol (glucocorticoid). Zona glomerulosa ‚Üí aldosterone (Na+/K+ regulation). Steroid hormones derived from cholesterol.'},
  adrenal_medulla:{cat:'Stress Axis',desc:'Modified sympathetic ganglion. Releases epinephrine (80%) + norepinephrine (20%) ‚Üí rapid fight-or-flight metabolic mobilization: ‚Üë glycogenolysis, ‚Üë lipolysis, ‚Üì insulin.'},
  sympathetic:{cat:'Stress Axis',desc:'Fight-or-flight. Releases NE at synapses + stimulates adrenal medulla. Direct metabolic: ‚Üë glycogenolysis (liver/muscle), ‚Üë lipolysis (adipose), ‚Üë glucagon, ‚Üì insulin.'},
  mouth:{cat:'GI Tract',desc:'Salivary Œ±-amylase: starch ‚Üí maltose + dextrins (Œ±-1,4 bonds). Lingual lipase (minor). Chewing = mechanical processing. Amylase inactivated by stomach HCl.'},
  stomach_gi:{cat:'GI Tract',desc:'Chief cells: pepsinogen (activated by HCl ‚Üí pepsin, cleaves Phe/Tyr). Parietal cells: HCl + intrinsic factor (IF for B12 absorption). G-cells: gastrin ‚Üí ‚Üë HCl. Gastric lipase (minor TG digestion).'},
  si_gi:{cat:'GI Tract',desc:'Primary digestion/absorption site. Duodenum: bile + pancreatic enzymes; CCK/secretin released. Jejunum: major absorption. Ileum: B12 (bound to IF), bile acid reabsorption (enterohepatic circulation).'},
  pancreas_enz:{cat:'GI Tract',desc:'Exocrine: amylase (starch), lipase (TG‚Üí2-MAG+2FFA), trypsin+chymotrypsin (activated by enterokinase), elastase, carboxypeptidase. Also: HCO3- (neutralizes acid chyme). Stimulated by CCK and secretin.'},
  bile:{cat:'GI Tract',desc:'Bile salts (cholesterol-derived, liver-made, gallbladder-stored). Amphipathic ‚Üí emulsify dietary fats ‚Üí micelles. CCK triggers GB contraction. Bile salts recycled via enterohepatic circulation (ileal reabsorption).'},
  brush_border:{cat:'GI Tract',desc:'Enterocyte apical membrane enzymes: maltase (maltose‚Üí2 glucose), sucrase (sucrose‚Üíglucose+fructose), lactase (lactose‚Üíglucose+galactose), aminopeptidases. Lactase deficiency = lactose intolerance.'},
  micelles:{cat:'GI Tract',desc:'Mixed micelles: bile salts + FA + 2-MAG + fat-soluble vitamins (A,D,E,K). Present lipids to brush border for passive absorption. FAs + 2-MAG diffuse into enterocytes ‚Üí re-esterified as TG.'},
  absorption:{cat:'GI Tract',desc:'Glucose: SGLT1 (Na-cotransport, apical) ‚Üí GLUT2 (basolateral). Fructose: GLUT5 (apical). AAs: Na-cotransporters. FAs: passive ‚Üí TG re-synthesis ‚Üí chylomicrons (apoB-48) ‚Üí lacteals ‚Üí lymph ‚Üí thoracic duct ‚Üí blood.'},
  insulin:{cat:'Hormone',desc:'Anabolic peptide from Œ≤-cells. Released by: glucose‚Üë, AAs‚Üë, GIP/GLP-1. Receptor: RTK (IRS-1‚ÜíPI3K‚ÜíAkt). Effects: ‚ÜëGLUT4 (muscle/adipose), ‚Üëglycogen synthase, ‚ÜëPFK-1 (via ‚ÜëF2,6-BP), ‚ÜëACC (lipogenesis), ‚ÜìFBPase-1 (‚ÜìGNG), ‚Üìglycogen phosphorylase, ‚ÜìHSL (‚Üìlipolysis).'},
  glucagon:{cat:'Hormone',desc:'Catabolic peptide from Œ±-cells. Released by: glucose‚Üì, AAs (Arg). Via cAMP-PKA: ‚Üëglycogen phosphorylase, ‚Üìglycogen synthase, ‚ÜëFBPase-1 (via ‚ÜìF2,6-BP), ‚ÜìPFK-1, ‚ÜëPEPCK (‚ÜëGNG), ‚Üëlipolysis, ‚Üëketogenesis. Completely opposes insulin.'},
  cortisol:{cat:'Hormone',desc:'Glucocorticoid steroid (delayed hours via nuclear receptor). ‚Üë GNG (‚ÜëPEPCK gene transcription), ‚Üë protein catabolism ‚Üí AAs for GNG, ‚Üë lipolysis, ‚Üì glucose uptake in peripheral tissues (anti-insulin). Anti-inflammatory. Permissive for glucagon/epi.'},
  epinephrine:{cat:'Hormone',desc:'Catecholamine from adrenal medulla. Rapid via Œ≤-AR (cAMP-PKA): ‚Üë glycogenolysis (liver+muscle), ‚Üë HSL ‚Üí lipolysis, ‚Üë glucagon, ‚Üì insulin (Œ±-AR on Œ≤-cells). Prepares for fight-or-flight energy mobilization.'},
  leptin:{cat:'Hormone',desc:'Adipokine ‚àù fat mass. CNS: activates POMC/CART, inhibits NPY/AgRP. Peripheral: activates AMPK (select tissues), ‚Üë Œ≤-oxidation. Leptin resistance underlies common obesity (hypothalamus unresponsive despite high leptin).'},
  ghrelin:{cat:'Hormone',desc:'"Hunger hormone." From gastric fundus X/A cells. Empty stomach ‚Üí ghrelin‚Üë ‚Üí NPY/AgRP activation. Falls post-meal. Also stimulates GH from anterior pituitary. Opposes leptin at hypothalamus.'},
  cck:{cat:'Hormone',desc:'CCK from I-cells (duodenum/jejunum). Fats+proteins ‚Üí CCK. Effects: ‚Üë pancreatic enzyme secretion, GB contraction (bile release), satiety via vagus. Slows gastric emptying. Short-acting satiety.'},
  pyy:{cat:'Hormone',desc:'From L-cells of distal intestine ‚àù caloric intake. Inhibits NPY/AgRP in hypothalamus ‚Üí satiety. Important mechanism by which bariatric surgery (particularly Roux-en-Y) reduces hunger.'},
  somatostatin:{cat:'Hormone',desc:'From Œ¥-cells of pancreas and GI. Inhibits BOTH insulin (Œ≤-cells) and glucagon (Œ±-cells). Inhibits GH, TSH. Acts as endocrine pancreas brake. Used therapeutically (octreotide) for acromegaly, carcinoid.'},
  incretins:{cat:'Hormone',desc:'GIP (K-cells) + GLP-1 (L-cells). Released by oral glucose ‚Üí amplify insulin secretion (the incretin effect: oral > IV glucose for insulin release). GLP-1 also: ‚Üì glucagon, ‚Üì gastric emptying, ‚Üë satiety. GLP-1 agonists (semaglutide) are major T2DM/obesity drugs.'},
  chylomicrons:{cat:'Blood/Transport',desc:'Largest, least dense lipoprotein. Made in enterocytes from dietary TG+cholesterol. ApoB-48. Travel via lacteals ‚Üí lymph ‚Üí thoracic duct ‚Üí blood. LPL degrades ‚Üí chylomicron remnants taken up by liver (ApoE recognition).'},
  blood_glucose:{cat:'Blood/Extracellular',desc:'Normal fasting: 70-100 mg/dL. GLUT transporters: GLUT1 (RBC, brain, constitutive), GLUT2 (liver/pancreas, high Km = glucose sensor), GLUT3 (brain, high affinity), GLUT4 (muscle/adipose, insulin-dependent). Triggers insulin (‚Üë) or glucagon (‚Üì).'},
  blood_ffa:{cat:'Blood/Extracellular',desc:'Non-esterified FAs bound to albumin. Released by adipose lipolysis (HSL, ATGL). Primary fuel for heart, liver, resting muscle. Cannot cross BBB ‚Üí brain cannot use FFAs directly. Elevated in T2DM, obesity, starvation.'},
  blood_aa:{cat:'Blood/Extracellular',desc:'From dietary absorption + protein catabolism. Gluconeogenic substrates. Trigger insulin (especially branched-chain AAs) and glucagon (especially Arg). BCAAs (Leu, Ile, Val) metabolized mainly in muscle, not liver.'},
  vldl:{cat:'Blood/Transport',desc:'Very Low Density Lipoprotein. Liver-made from endogenous TG + cholesterol. ApoB-100. Delivers TG to peripheral tissues. Degraded by LPL ‚Üí IDL ‚Üí LDL. High VLDL = hypertriglyceridemia. Insulin stimulates VLDL secretion.'},
  lpl:{cat:'Blood/Transport',desc:'Lipoprotein Lipase on capillary walls (muscle, heart, adipose). Cleaves TG from chylomicrons+VLDL ‚Üí FFA+glycerol for uptake. ApoC-II activates; ApoC-III inhibits. Insulin ‚ÜëLPL in adipose. Muscle LPL provides FAs for Œ≤-oxidation.'},
  rbc:{cat:'Organ',desc:'No mitochondria ‚Üí 100% anaerobic glycolysis only. Export lactate (Cori cycle). PPP heavily used: NADPH ‚Üí glutathione peroxidase ‚Üí protect against oxidative hemolysis. G6PD deficiency: X-linked, PPP blocked ‚Üí hemolytic anemia with oxidants (primaquine, fava beans).'},
  liver_organ:{cat:'Organ',desc:'Metabolic HUB. Unique capabilities: gluconeogenesis (has G6Pase), glycogenolysis+glycogenesis (100g glycogen), FA synthesis, Œ≤-oxidation, ketogenesis (not ketone use), VLDL secretion, urea cycle, drug metabolism (CYP450), bile synthesis. First-pass portal blood.'},
  muscle_organ:{cat:'Organ',desc:'Largest glucose consumer (GLUT4, insulin-dependent). Has ~400g glycogen (no G6Pase ‚Üí local use only). Uses glucose, FFAs, ketones. Exports lactate (‚Üí Cori cycle) + alanine (‚Üí glucose-alanine cycle) to liver. At rest: mainly Œ≤-oxidation.'},
  brain_organ:{cat:'Organ',desc:'Uses 120g glucose/day normally (GLUT1/3, constitutive). Cannot oxidize FFAs (no Œ≤-oxidation). In starvation: adapts to ketones (acetoacetate, Œ≤-OHB) ‚Üí spares protein. Minimum ~30g/day glucose even in ketosis. Extremely sensitive to hypoglycemia.'},
  adipose_organ:{cat:'Organ',desc:'Energy storage. Fed+insulin: GLUT4‚Üë, lipogenesis (glucose‚ÜíG3P+FFA‚ÜíTG). Fasting+glucagon/epi/cortisol: HSL+ATGL ‚Üí lipolysis ‚Üí FFA+glycerol. Glycerol ‚Üí liver GNG. FFA ‚Üí blood. Endocrine: secretes leptin, adiponectin, resistin.'},
  kidney_organ:{cat:'Organ',desc:'GNG in fasting (has all GNG enzymes + G6Pase). Metabolizes glutamine ‚Üí NH4+ + HCO3- (acid-base regulation). Reabsorbs glucose via SGLT2 (therapeutic target: SGLT2 inhibitors). Activates vitamin D (1-Œ±-hydroxylase).'},
  glycogen:{cat:'Cytoplasm',desc:'Glucose polymer (Œ±-1,4 links, Œ±-1,6 branches every 8-10). Liver: ~100g (blood glucose buffer). Muscle: ~400g (local fuel, no G6Pase). Depleted in ~12-18 hrs fasting. Primer: glycogenin. Branches: branching enzyme (Œ±-1,4‚ÜíŒ±-1,6), debranching enzyme (glycogenolysis).'},
  glycogen_synthase:{cat:'Cytoplasm',desc:'Active = dephosphorylated. Activators: insulin (‚ÜíPP1 phosphatase), G6P (allosteric). Inhibitors (phosphorylation): PKA (glucagon, epi), AMPK. Reciprocal regulation with glycogen phosphorylase ‚Äî cannot be active simultaneously in normal physiology.'},
  glycogen_phosphorylase:{cat:'Cytoplasm',desc:'Active = phosphorylated (phosphorylase a). Activated: AMP (allosteric, low energy), PKA cascade (glucagon, epi), Ca¬≤‚Å∫ (muscle). Inhibited: ATP, G6P (energy sufficient), insulin (via PP1), glucose (liver isoform). Rate-limiting for glycogenolysis.'},
  ppp:{cat:'Cytoplasm',desc:'Pentose Phosphate Pathway (HMP shunt). OXIDATIVE PHASE: G6P ‚Üí NADPH(√ó2) + CO2 + ribulose-5-P. Rate-limited by G6PD (product-inhibited by NADPH). NON-OXIDATIVE PHASE: transketolase (B1/thiamine!), transaldolase ‚Üí F6P, G3P (back to glycolysis), ribose-5-P. HIGH in: RBCs, liver, lactating mammary, adrenals (NADPH for steroid synthesis).'},
  nadph_cyto:{cat:'Cytoplasm',desc:'NADPH (cytoplasmic): (1) FA synthesis ‚Äî FAS needs 14 NADPH per palmitate, (2) Glutathione reduction (antioxidant, critical in RBCs), (3) P450 detox reactions, (4) Cholesterol synthesis, (5) Steroid hydroxylation. DISTINCT from mitochondrial NADH (ETC). Malic enzyme also produces NADPH (malate‚Üípyruvate).'},
  ribose5p:{cat:'Cytoplasm',desc:'From PPP non-oxidative phase. Required for: nucleotide synthesis (DNA/RNA/ATP/NAD/FAD/CoA). Rapidly dividing cells (bone marrow, GI epithelium) need lots. If NADPH demand > ribose need: non-oxidative phase runs in reverse to convert ribose ‚Üí F6P/G3P.'},
  glucose_cyto:{cat:'Cytoplasm',desc:'Glycolysis entry. Phosphorylated immediately ‚Üí G6P (traps glucose). Hexokinase (brain/muscle): low Km, high affinity, inhibited by G6P. Glucokinase (liver/pancreas Œ≤-cells): high Km, not inhibited by G6P ‚Üí acts as glucose sensor. GLUT2 in liver.'},
  g6p:{cat:'Cytoplasm',desc:'Central junction: ‚Üí glycolysis (PGI ‚Üí F6P), glycogenesis (PGM ‚Üí G1P ‚Üí UDP-glc), PPP (G6PD), or back to glucose via G6Pase (liver/kidney only). G6P: allosterically activates glycogen synthase; inhibits hexokinase (not glucokinase); inhibits glycogen phosphorylase.'},
  f6p:{cat:'Cytoplasm',desc:'Between G6P and the main regulatory step (PFK-1). Also substrate for PFK-2 ‚Üí F2,6-BP (key regulator of PFK-1). In GNG: produced from F1,6-BP by FBPase-1.'},
  pfk1:{cat:'Cytoplasm',desc:'PFK-1: RATE-LIMITING of glycolysis. IRREVERSIBLE. ‚ú¶ Activated by: AMP, ADP, F2,6-BP (strongest!), NH4+. ‚úó Inhibited by: ATP (allosteric, sigmoidal kinetics), citrate (TCA saturation signal), H+. F2,6-BP is the dominant acute regulator ‚Äî controlled by insulin (‚Üë) and glucagon (‚Üì) via PFK-2/FBPase-2.'},
  f16bp:{cat:'Cytoplasm',desc:'Fructose-1,6-bisphosphate. PFK-1 product (glycolysis) / FBPase-1 substrate (GNG). Allosterically activates pyruvate kinase (feed-forward). Split by aldolase ‚Üí DHAP + G3P. Aldolase reaction is the only C-C bond cleavage in glycolysis.'},
  g3p_dhap:{cat:'Cytoplasm',desc:'G3P (glyceraldehyde-3-phosphate) ‚Üí continues glycolysis ‚Üí 2 ATP + 2 NADH per G3P. DHAP ‚Üî G3P (triose phosphate isomerase, TPI). DHAP ‚Üí glycerol-3-P (for TG backbone). This is how glycerol from lipolysis enters gluconeogenesis.'},
  pyruvate_cyto:{cat:'Cytoplasm',desc:'Final glycolysis product. FATES: (1) ‚Üí Mito ‚Üí PDH ‚Üí Acetyl-CoA (aerobic); (2) ‚Üí LDH ‚Üí Lactate (anaerobic, regenerates NAD+); (3) ‚Üí Pyruvate carboxylase ‚Üí OAA (GNG, needs acetyl-CoA activation); (4) ‚Üí ALT ‚Üí Alanine (glucose-alanine cycle); (5) ‚Üí PDH bypass in some pathways.'},
  lactate:{cat:'Cytoplasm',desc:'LDH: pyruvate + NADH ‚Üí lactate + NAD+. Regenerates NAD+ ‚Üí allows continued anaerobic glycolysis. Exported to blood ‚Üí liver (Cori cycle): lactate ‚Üí pyruvate ‚Üí GNG ‚Üí glucose. Also: exercising muscle, RBCs, tumor cells (Warburg effect). Lactic acidosis (pH‚Üì) in severe ischemia, PDH deficiency, metformin overdose.'},
  fbpase1:{cat:'Cytoplasm',desc:'FBPase-1: rate-limiting of GNG. IRREVERSIBLE bypass of PFK-1. ‚úó Inhibited by: AMP (low energy ‚Üí no GNG), F2,6-BP (insulin signal ‚Üí no GNG). ‚ú¶ Activated by: citrate (energy full ‚Üí ‚Üë GNG), glucagon (via ‚ÜìF2,6-BP). Reciprocally regulated with PFK-1 ‚Äî when one is on, the other is off. Prevents futile cycling.'},
  pep:{cat:'Cytoplasm',desc:'Phosphoenolpyruvate. High-energy intermediate. In glycolysis: PEP ‚Üí pyruvate (pyruvate kinase, +ATP). In GNG: OAA ‚Üí PEP via PEPCK (2nd bypass point). PEP + pyruvate kinase step is also irreversible in glycolysis (3rd GNG bypass).'},
  pepck:{cat:'Cytoplasm',desc:'PEPCK: OAA ‚Üí PEP + CO2 (uses GTP). 2nd GNG bypass. Induced transcriptionally by: glucagon, cortisol, cAMP. Repressed by insulin. Key rate-limiting enzyme of GNG. Localized in cytoplasm (mammalian).'},
  oaa_cyto:{cat:'Cytoplasm',desc:'Cytoplasmic OAA for GNG. Source: pyruvate carboxylase (mito) ‚Üí OAA transported out as malate (via malate-aspartate shuttle in reverse) or aspartate ‚Üí reconverted in cytoplasm. Also from citrate shuttle (ATP-citrate lyase ‚Üí acetyl-CoA + OAA).'},
  pyruvate_carboxylase:{cat:'Cytoplasm',desc:'Located in mitochondria. Pyruvate + CO2 + ATP ‚Üí OAA (requires biotin/B7). ALLOSTERICALLY ACTIVATED by acetyl-CoA ‚Äî this is critical: when FAs are being oxidized (high acetyl-CoA), pyruvate carboxylase ‚Üë ‚Üí OAA ‚Üë ‚Üí TCA replenished AND GNG fueled. Inhibited when acetyl-CoA is low.'},
  g6pase:{cat:'Cytoplasm',desc:'Located in ER lumen. Present ONLY in liver, kidney, intestine (NOT muscle ‚Üí muscle glycogen cannot be released to blood). Final step of both GNG and glycogenolysis: G6P ‚Üí glucose ‚Üí exported. Deficiency = von Gierke disease (glycogen storage type I).'},
  amp:{cat:'Regulator',desc:'AMP = low energy signal. AMP/ATP ratio rises dramatically when energy is low (AMP changes ~100√ó more than ATP). ‚ú¶ Activates: PFK-1 (‚Üë glycolysis), AMPK (master catabolic kinase), glycogen phosphorylase (‚Üë glycogenolysis). ‚úó Inhibits: FBPase-1 (‚Üì GNG). The body is maximally sensitive to this signal.'},
  atp_reg:{cat:'Regulator',desc:'ATP = high energy signal. ‚úó Inhibits: PFK-1 (allosteric, high-affinity site changes sigmoidal kinetics), citrate synthase (TCA entry), isocitrate DH (TCA rate-lim.), glycogen phosphorylase (energy sufficient). Signals: slow down catabolism, we have enough fuel.'},
  f26bp:{cat:'Regulator',desc:'F-2,6-bisphosphate: regulatory molecule only (NOT a glycolysis intermediate). Made by PFK-2 domain; broken by FBPase-2 domain of the SAME bifunctional enzyme. Insulin: activates PFK-2 (phosphatase) ‚Üí ‚ÜëF2,6-BP ‚Üí ‚ÜëPFK-1 + ‚ÜìFBPase-1. Glucagon: activates FBPase-2 ‚Üí ‚ÜìF2,6-BP ‚Üí ‚ÜìPFK-1 + ‚ÜëFBPase-1. MOST POTENT PFK-1 activator.'},
  ampk:{cat:'Regulator',desc:'AMP-Activated Protein Kinase = master energy sensor. Activated by: ‚ÜëAMP/ATP ratio (starvation, exercise), leptin, adiponectin, METFORMIN (T2DM drug). When active: ‚ÜëŒ≤-oxidation (‚ÜëCPT-1 activity), ‚Üëglucose uptake, ‚Üëglycolysis. ‚úó Inhibits: ACC (‚Üí‚Üìmalonyl-CoA‚Üí‚ÜëCPT-1‚Üí‚ÜëŒ≤-oxidation), FA synthesis, glycogen synthesis, GNG. Metformin works through AMPK activation.'},
  citrate_reg:{cat:'Regulator',desc:'Citrate exits mito when TCA is saturated (energy full). In cytoplasm: (1) ‚úó Inhibits PFK-1 ‚Äî "enough acetyl-CoA from TCA, stop glycolysis"; (2) ‚ú¶ Activates ACC ‚Üí malonyl-CoA ‚Üí FA synthesis; (3) ‚ú¶ Activates FBPase-1 ‚Üí ‚Üë GNG. Citrate is thus the "energy-replete" signal that switches metabolism from catabolism to anabolic fat storage.'},
  nadh_mito:{cat:'Regulator',desc:'Mitochondrial NADH. High NADH/NAD+ = energy surplus. Product inhibition: ‚úó Inhibits PDH, citrate synthase, isocitrate DH, Œ±-KG DH. Slows TCA when already producing enough reducing equivalents. Donates electrons to Complex I.'},
  fadh2:{cat:'Regulator',desc:'FADH2 from: succinate DH (TCA = Complex II) and Œ≤-oxidation. Donates electrons to CoQ in Complex II (no H+ pumping ‚Üí less ATP: ~1.5 ATP vs NADH ‚Üí ~2.5 ATP). This explains why FAs give more ATP/carbon than glucose (more FADH2 + NADH generated per acetyl-CoA).'},
  aa_catabolism:{cat:'Cytoplasm',desc:'Step 1: Transamination ‚Äî aminotransferases (ALT, AST) transfer -NH2 to Œ±-KG ‚Üí glutamate + Œ±-keto acid. Requires PLP (pyridoxal phosphate, B6). Step 2: Oxidative deamination ‚Äî glutamate ‚Üí Œ±-KG + NH4+ (GDH, reversible). NH4+ ‚Üí urea cycle. Œ±-Keto acids ‚Üí various TCA entry points.'},
  glutamate:{cat:'Cytoplasm',desc:'Hub of nitrogen metabolism. Accepts amino groups in transamination (becomes glutamate from Œ±-KG). GDH: glutamate ‚Üî Œ±-KG + NH4+ (reversible). NAD+ or NADP+ dependent. NH4+ ‚Üí urea cycle. Glutamate also ‚Üí GABA (CNS), glutamine (N carrier), aspartate (urea cycle N donor).'},
  alanine:{cat:'Cytoplasm',desc:'Glucose-alanine cycle (Cahill cycle): Muscle: pyruvate + glutamate ‚Üí alanine + Œ±-KG (ALT). Alanine exported to blood ‚Üí liver ‚Üí pyruvate + glutamate (ALT reverse). Pyruvate ‚Üí GNG. Glutamate ‚Üí urea cycle. Safe non-toxic nitrogen transport from muscle. Elevated in fasting.'},
  alpha_keto_acids:{cat:'Cytoplasm',desc:'TCA entry points by AA: Pyruvate ‚Äî Ala, Cys, Gly, Ser, Thr, Trp (glucogenic). OAA ‚Äî Asp, Asn (glucogenic). Œ±-KG ‚Äî Glu, Gln, Pro, Arg, His (glucogenic). Succinyl-CoA ‚Äî Met, Val, Ile, Thr (glucogenic). Fumarate ‚Äî Phe, Tyr (both). Acetyl-CoA ‚Äî Leu, Lys (PURELY KETOGENIC); Ile, Phe, Tyr, Trp, Thr (both). Note: only FAs+ketogenic AAs enter as acetyl-CoA ‚Üí cannot be net gluconeogenic.'},
  citrate_shuttle:{cat:'Cytoplasm',desc:'Citrate exits mito via citrate transporter when TCA is saturated. In cytoplasm: ATP-citrate lyase ‚Üí acetyl-CoA + OAA. This is the ONLY way to get mitochondrial acetyl-CoA into cytoplasm for FA synthesis (acetyl-CoA itself cannot cross the inner mito membrane).'},
  acc:{cat:'Cytoplasm',desc:'Acetyl-CoA Carboxylase: rate-limiting enzyme for FA synthesis. Adds CO2 to acetyl-CoA ‚Üí malonyl-CoA. Requires biotin (B7) + ATP. ‚ú¶ Activated by: citrate (allosteric, causes polymerization), insulin (dephosphorylation). ‚úó Inhibited by: palmitoyl-CoA (product feedback), AMPK (phosphorylation), glucagon. Product malonyl-CoA also inhibits CPT-1 ‚Üí prevents simultaneous FA synthesis and Œ≤-oxidation.'},
  malonylcoa:{cat:'Cytoplasm',desc:'Two roles: (1) FA elongation substrate for FAS (7 malonyl-CoA + 1 acetyl-CoA ‚Üí palmitate). (2) INHIBITS CPT-1 ‚Äî when malonyl-CoA is high (FA synthesis on), CPT-1 is blocked ‚Üí no FA entry into mito ‚Üí no Œ≤-oxidation. KEY SWITCH preventing futile cycling: insulin‚Üë ‚Üí ACC‚Üë ‚Üí malonyl-CoA‚Üë ‚Üí CPT-1‚Üì.'},
  fas:{cat:'Cytoplasm',desc:'Fatty Acid Synthase: multifunctional enzyme complex. Each elongation cycle: malonyl-CoA + acetyl-CoA or acyl-CoA ‚Üí CO2 loss ‚Üí ketoacyl-ACP ‚Üí reduction (NADPH) ‚Üí dehydration ‚Üí reduction (NADPH) ‚Üí saturated acyl-ACP. 7 cycles ‚Üí palmitate (16C). Needs: 14 NADPH (mainly from PPP+malic enzyme).'},
  palmitate:{cat:'Cytoplasm',desc:'16-carbon saturated FA from FAS. Can be: elongated (‚Üí18C stearate), desaturated (palmitoleate, oleate), esterified to TG (storage), esterified to phospholipids (membranes), packaged in VLDL (liver export). Palmitoyl-CoA feedback inhibits ACC.'},
  fattyacylcoa_cyto:{cat:'Cytoplasm',desc:'FA activated by acyl-CoA synthetase (cytoplasm): FA + CoA + ATP ‚Üí fatty acyl-CoA + AMP + PPi (costs 2 ATP equivalents). This traps FA in cell and makes it reactive. Substrate for: Œ≤-oxidation (via CPT-1), TG synthesis, phospholipids. Palmitoyl-CoA feedback-inhibits ACC.'},
  cpt1:{cat:'Cytoplasm',desc:'Carnitine Palmitoyltransferase I (outer mito membrane). RATE-LIMITING step of Œ≤-oxidation. Transfers acyl group from CoA to carnitine ‚Üí acyl-carnitine (crosses inner mito membrane via CACT transporter). ‚úó INHIBITED by malonyl-CoA ‚Äî master switch: FA synthesis on = Œ≤-oxidation off. CPT-1 is also activated by AMPK (indirectly via ‚ÜìACC ‚Üí ‚Üìmalonyl-CoA).'},
  pyruvate_mito:{cat:'Mitochondria',desc:'Pyruvate transported from cytoplasm ‚Üí mitochondrial matrix via MPC (mitochondrial pyruvate carrier; inhibited by UK5099 experimentally). In matrix: PDH (aerobic) or pyruvate carboxylase (when acetyl-CoA high ‚Üí GNG).'},
  pdh:{cat:'Mitochondria',desc:'Pyruvate Dehydrogenase Complex. Irreversible ‚Äî commits carbon to TCA. Cofactors: B1 (TPP/thiamine), B2 (FAD), B3 (NAD+), B5 (CoA), lipoic acid. Products: acetyl-CoA + NADH + CO2. ‚úó Inhibited by: acetyl-CoA, NADH, ATP (products). ‚ú¶ Activated by: AMP, CoA, NAD+, Ca¬≤‚Å∫ (exercise). PDH kinase (phosphorylates=inactivates); PDH phosphatase (activates). PDH deficiency ‚Üí lactic acidosis, elevated pyruvate, neurological dysfunction.'},
  acetylcoa_mito:{cat:'Mitochondria',desc:'CENTRAL HUB of aerobic metabolism. Sources: PDH (pyruvate), Œ≤-oxidation (FAs), ketogenic AAs, ketone utilization (not liver). Fates: TCA cycle (condensing with OAA ‚Üí citrate), ketogenesis (liver: 2√óAcCoA ‚Üí HMG-CoA ‚Üí ketones), cholesterol synthesis (cytoplasm via shuttle). CANNOT go back to pyruvate ‚Üí FAs and purely ketogenic AAs are NOT net gluconeogenic.'},
  oaa_mito:{cat:'Mitochondria',desc:'OAA in mito: condensed with AcCoA by citrate synthase ‚Üí citrate (TCA entry). Also: malate DH ‚Üí regenerated at end of TCA (malate‚ÜíOAA+NADH). Transaminated ‚Üí aspartate (urea cycle N donor). Low OAA ‚Üí TCA stalls. Anaplerosis (replenishing OAA/TCA intermediates) is essential.'},
  citrate_synth:{cat:'Mitochondria',desc:'Citrate Synthase: first TCA enzyme. OAA + acetyl-CoA ‚Üí citrate + CoA. ‚úó Inhibited by: ATP, NADH, citrate (product). Controls TCA input rate. Activated by ADP, Ca¬≤‚Å∫. If OAA is low (mito), this step is limiting.'},
  citrate_mito:{cat:'Mitochondria',desc:'First TCA intermediate. Two fates: (1) Aconitase ‚Üí isocitrate (TCA continues); (2) Exits mito via citrate transporter ‚Üí cytoplasm ‚Üí FA synthesis (citrate shuttle) + regulatory signal (inhibits PFK-1, activates ACC/FBPase-1).'},
  isocitrate:{cat:'Mitochondria',desc:'From citrate via aconitase (iron-sulfur enzyme). Substrate for isocitrate DH ‚Äî rate-limiting TCA enzyme. IDH1 (cytoplasmic) and IDH2 (mitochondrial) mutations produce 2-hydroxyglutarate (oncometabolite) in glioma, AML.'},
  idh:{cat:'Mitochondria',desc:'Isocitrate Dehydrogenase: RATE-LIMITING of TCA. Isocitrate ‚Üí Œ±-KG + NADH + CO2. ‚úó Inhibited by: ATP, NADH. ‚ú¶ Activated by: ADP, Ca¬≤‚Å∫ (matches TCA to energy need and muscle contraction). IDH mutations are oncogenic in glioma and AML.'},
  akg:{cat:'Mitochondria',desc:'Œ±-Ketoglutarate (= 2-oxoglutarate). Central node connecting TCA and AA metabolism. TCA: from isocitrate (IDH). AA catabolism: from glutamate (GDH), glutamine, proline, arginine, histidine (transamination). Feeds akgDH ‚Üí succinyl-CoA.'},
  akgdh:{cat:'Mitochondria',desc:'Œ±-KG Dehydrogenase Complex. Like PDH: requires B1/thiamine (TPP), lipoic acid, FAD, NAD+. Œ±-KG ‚Üí succinyl-CoA + NADH + CO2. ‚úó Inhibited by: succinyl-CoA (product), NADH. Not regulated by phosphorylation (unlike PDH).'},
  succinylcoa:{cat:'Mitochondria',desc:'High-energy thioester. ‚Üí succinate + GTP (substrate-level phosphorylation via succinyl-CoA synthetase ‚Äî only TCA step producing GTP). Entry for: Met, Val, Ile, Thr (glucogenic AAs), odd-chain FAs (propionyl-CoA ‚Üí methylmalonyl-CoA ‚Üí succinyl-CoA; requires B12 + biotin). Also: heme synthesis (ALA synthase uses succinyl-CoA + Gly).'},
  succinate:{cat:'Mitochondria',desc:'Oxidized by succinate DH (SDH = Complex II of ETC). Dual role: TCA + ETC. Complex II: transfers e- to FADH2 ‚Üí CoQ. Inhibited by malonate (competitive, classic inhibitor used in biochemistry). SDH mutations ‚Üí hereditary paraganglioma/pheochromocytoma.'},
  fumarate_mito:{cat:'Mitochondria',desc:'From Complex II/SDH. Also enters from urea cycle (argininosuccinate ‚Üí arginine + fumarate) ‚Üí links urea cycle to TCA. From Phe/Tyr catabolism. Fumarase (fumarate hydratase) ‚Üí malate. Fumarase mutations ‚Üí fumaric aciduria + cancer.'},
  malate:{cat:'Mitochondria',desc:'From fumarase. Malate DH: malate + NAD+ ‚Üí OAA + NADH (closes TCA). Malate can exit mito via malate-aspartate shuttle (brings NADH reducing equivalents from cytoplasm to mito for ETC). Also: malic enzyme: malate ‚Üí pyruvate + NADPH (cytoplasm) ‚Äî another source of NADPH.'},
  hmgcoa:{cat:'Mitochondria',desc:'HMG-CoA in MITOCHONDRIA (different pool from cytoplasmic HMG-CoA for cholesterol synthesis). 2 AcCoA ‚Üí acetoacetyl-CoA ‚Üí + AcCoA ‚Üí HMG-CoA (HMG-CoA synthase, liver). Rate-limiting for ketogenesis. HMG-CoA lyase ‚Üí acetoacetate + AcCoA. Rate increases with high fat diet, starvation, uncontrolled T1DM.'},
  ketones:{cat:'Mitochondria',desc:'Ketone bodies: acetoacetate + Œ≤-hydroxybutyrate (Œ≤-OHB, reduced by Œ≤-OHB-DH + NADH) + acetone (spontaneous decarboxylation). Made in LIVER mito. Used by: brain, heart, kidney, muscle. LIVER CANNOT USE KETONES (lacks thiophorase/succinyl-CoA:3-ketoacid-CoA transferase). DKA: uncontrolled T1DM ‚Üí excess FFA ‚Üí excess acetyl-CoA ‚Üí ketogenesis overwhelms buffering ‚Üí pH‚Üì.'},
  fattyacylcoa_mito:{cat:'Mitochondria',desc:'Fatty acyl-CoA in mito matrix. From CPT-1/CACT/CPT-2 transport system. Undergoes Œ≤-oxidation: (1) Acyl-CoA DH (FAD‚ÜíFADH2) ‚Üí trans-enoyl-CoA; (2) Enoyl-CoA hydratase (+H2O) ‚Üí 3-hydroxyacyl-CoA; (3) 3-hydroxyacyl-CoA DH (NAD+‚ÜíNADH); (4) Thiolase (+CoA, thiolysis) ‚Üí acetyl-CoA + shortened acyl-CoA.'},
  beta_ox:{cat:'Mitochondria',desc:'Œ≤-Oxidation spiral. Each turn: ‚àí2C as acetyl-CoA, +1 FADH2 + 1 NADH. Palmitate (16C): 7 turns ‚Üí 8 acetyl-CoA + 7 FADH2 + 7 NADH ‚Üí ~106 ATP net. Odd-chain FAs: last product = propionyl-CoA ‚Üí propionyl-CoA carboxylase (biotin) ‚Üí methylmalonyl-CoA ‚Üí succinyl-CoA (B12, methylmalonyl-CoA mutase). Œ≤-oxidation is suppressed when malonyl-CoA is high.'},
  complex1:{cat:'ETC',desc:'Complex I (NADH Dehydrogenase). NADH ‚Üí NAD+ (e- to CoQ). Pumps 4H+/pair across inner mito membrane. Contains FMN and Fe-S centers. ‚úó Inhibited by: rotenone (insecticide), amytal, MPTP (dopaminergic neurotoxin ‚Üí parkinsonism). Produces ~2.5 ATP per NADH.'},
  complex2:{cat:'ETC',desc:'Complex II (Succinate DH). FADH2 ‚Üí FAD (e- to CoQ). Does NOT pump H+ ‚Üí less ATP per FADH2 (~1.5 ATP). Only ETC complex that is also a TCA enzyme. Contains FAD + Fe-S. Inhibited by malonate (competitive with succinate). SDH mutations ‚Üí SDHA/B/C/D ‚Üí hereditary paraganglioma/pheochromocytoma.'},
  complex3:{cat:'ETC',desc:'Complex III (Cytochrome bc1). CoQH2 ‚Üí cytochrome c. Pumps 4H+ (Q-cycle mechanism). Contains: cytochrome b (ubiquinol binding), Rieske Fe-S, cytochrome c1. ‚úó Inhibited by: antimycin A (blocks Qi site).'},
  complex4:{cat:'ETC',desc:'Complex IV (Cytochrome c Oxidase). Cyt c ‚Üí O2 ‚Üí 2H2O. Final e- acceptor. Pumps 2H+/pair. Contains: Cu_A, heme a, heme a3-Cu_B. ‚úó Inhibited by: CN- (cyanide), CO, azide, H2S ‚Äî all block O2 binding ‚Üí ETC halts ‚Üí no ATP ‚Üí cellular asphyxiation. Rate-limiting step under normal physiological conditions.'},
  atp_synthase:{cat:'ETC',desc:'ATP Synthase (Complex V / F0F1-ATPase). H+ flows down gradient through F0 ‚Üí rotates Œ≥-subunit ‚Üí F1 catalytic head changes conformation ‚Üí ADP+Pi ‚Üí ATP. ~2.5 ATP per NADH, ~1.5 ATP per FADH2. ‚úó Inhibited by: oligomycin (blocks F0 H+ channel ‚Üí H+ cannot flow ‚Üí gradient builds ‚Üí upstream ETC slows). Uncouplers (DNP, thermogenin/UCP-1 in brown fat) dissipate gradient as HEAT without making ATP.'},
  proton_gradient:{cat:'ETC',desc:'Electrochemical H+ gradient (proton-motive force) across inner mito membrane. Generated by Complexes I, III, IV pumping H+ into intermembrane space. Used by ATP synthase. Uncouplers (DNP, thermogenin) collapse gradient ‚Üí heat, not ATP. Brown adipose: UCP-1 ‚Üí thermogenesis (newborns, hibernators).'},
  atp_out:{cat:'ETC',desc:'Total ATP per glucose: ~30-32 ATP (modern mitochondrial coupling ratio estimates). Substrate-level: 2 (glycolysis) + 2 (TCA) = 4 ATP. Oxidative: 10 NADH √ó 2.5 = 25 + 2 FADH2 √ó 1.5 = 3 ATP. Total ~32 ATP. Old textbook number (38 ATP) overestimates due to membrane leakage and ATP/ADP transport costs.'},
  nh4_plus:{cat:'Urea Cycle',desc:'NH4+ from: GDH (glutamate ‚Üí Œ±-KG + NH4+), glutaminase, AMP deaminase. Toxic: disrupts TCA (depletes Œ±-KG ‚Üí OAA), inhibits PDH, causes cerebral edema. Must be detoxified in liver (urea cycle) or kidney (‚Üí NH4+ in urine for acid-base). Hyperammonemia: liver failure, urea cycle defects ‚Üí encephalopathy.'},
  nag:{cat:'Urea Cycle',desc:'N-Acetylglutamate: obligate allosteric activator of CPS-I (without NAG, CPS-I is completely inactive). Made by NAG synthase: acetyl-CoA + glutamate ‚Üí NAG. High protein/AA ‚Üí ‚Üë glutamate ‚Üí ‚Üë NAG ‚Üí ‚Üë CPS-I ‚Üí ‚Üë urea cycle. This couples protein catabolism rate directly to urea disposal capacity.'},
  cpsi:{cat:'Urea Cycle',desc:'CPS-I (Carbamoyl Phosphate Synthetase I): first committed step, mitochondrial. NH4+ + CO2 + 2ATP ‚Üí carbamoyl phosphate. Activated ONLY by NAG. CPS-I deficiency: hyperammonemia type I. CPSII (cytoplasmic, different enzyme): uses glutamine, makes carbamoyl-P for pyrimidine synthesis.'},
  carbamoyl_p:{cat:'Urea Cycle',desc:'Carbamoyl phosphate (mito). Condensed with ornithine by OTC (ornithine transcarbamylase) ‚Üí citrulline. OTC deficiency: most common urea cycle disorder, X-linked (males affected; females carriers with variable expression). Presents with hyperammonemia especially post-high-protein meal.'},
  ornithine:{cat:'Urea Cycle',desc:'Recycled carrier. Imported from cytoplasm into mito (via ornithine/citrulline antiporter). Condenses with carbamoyl phosphate ‚Üí citrulline (mito). Regenerated from arginine by arginase (last step, cytoplasm). Ornithine is the structural backbone that gets passed around the cycle.'},
  citrulline:{cat:'Urea Cycle',desc:'Exits mito to cytoplasm via citrulline/ornithine antiporter. Condensed with aspartate (argininosuccinate synthetase, +ATP ‚Üí AMP+PPi) ‚Üí argininosuccinate. Citrullinemia: argininosuccinate synthetase deficiency.'},
  aspartate_uc:{cat:'Urea Cycle',desc:'Second nitrogen for urea (from aspartate, not NH4+ directly). OAA ‚Üí aspartate via transamination (glutamate as N donor). This is the biochemical bridge: TCA ‚Üí OAA ‚Üí aspartate ‚Üí urea cycle N. Argininosuccinate synthetase deficiency ‚Üí citrullinemia.'},
  argininosuccinate:{cat:'Urea Cycle',desc:'Argininosuccinate lyase cleaves ‚Üí arginine + fumarate. Fumarate enters TCA (fumarate ‚Üí malate ‚Üí OAA). LINK BETWEEN UREA CYCLE AND TCA CYCLE. Argininosuccinic aciduria: ASL deficiency ‚Üí argininosuccinate accumulation.'},
  arginine_uc:{cat:'Urea Cycle',desc:'Arginase (liver cytoplasm): arginine ‚Üí ornithine + urea. Ornithine ‚Üí mito (recycled). Urea ‚Üí blood ‚Üí kidney ‚Üí urine. Arginine is conditionally essential (adults can synthesize via urea cycle intermediates). Arginase deficiency: hyperammonemia type II.'},
  urea_out:{cat:'Urea Cycle',desc:'Urea: 2 nitrogens (1 from NH4+, 1 from aspartate). Non-toxic. Excreted in urine. Net cost: 4 ATP per urea. BUN (blood urea nitrogen): clinical marker. ‚Üë BUN: ‚Üë protein catabolism, dehydration, GI bleed (blood protein digested), pre-renal failure. ‚Üì BUN: liver failure (cannot make urea), malnutrition.'},
  fumarate_uc:{cat:'Urea Cycle',desc:'Fumarate byproduct of argininosuccinate lyase. Enters TCA: fumarate ‚Üí malate ‚Üí OAA ‚Üí can be used for more aspartate (‚Üí urea cycle) or condense with acetyl-CoA (‚Üí citrate). This creates the urea cycle-TCA CYCLE LINK ‚Äî nitrogen disposal is energetically coupled to central metabolism.'},
};

// Node info panel
function showPanel(node){
  const id=node.id(), d=DESC[id]||{cat:node.data('cat'),desc:'Biochemical node in the MCAT metabolism map.'};
  const panel=document.getElementById('panel');
  const catColor = CAT_COLOR[node.data('cat')]||'#aaa';
  let connsHtml = '';
  const connected = node.connectedEdges();
  const out=[], inE=[];
  connected.forEach(e=>{
    const isOut = e.data('source')===id;
    const other = isOut ? cy.$('#'+e.data('target')) : cy.$('#'+e.data('source'));
    const oLabel = other.data('label')||other.id();
    const shortLabel = oLabel.split('\n')[0];
    const t=e.data('etype'), lbl=e.data('label')||'';
    const cls={produces:'cp',activates:'ca',inhibits:'cb',signals:'cs',transports:'ct'}[t]||'cp';
    const sym={produces:'‚Üí',activates:'‚ú¶',inhibits:'‚úó',signals:'‚óà',transports:'‚á¢'}[t]||'‚Üí';
    if(isOut) out.push(`<div class="ci ${cls}">${sym} ${shortLabel}${lbl?' ('+lbl+')':''}</div>`);
    else inE.push(`<div class="ci ${cls}">${sym} ${shortLabel}${lbl?' ('+lbl+')':''}</div>`);
  });
  panel.innerHTML = `
    <h2>Node Info</h2>
    <div class="pn" style="color:${catColor}">${node.data('label').replace(/\n/g,'<br>')}</div>
    <div class="pc" style="color:${catColor}">${d.cat||node.data('cat')}</div>
    <div class="pd">${d.desc}</div>
    ${out.length?`<div class="pct">OUTPUTS</div>${out.join('')}`:''}
    ${inE.length?`<div class="pct">INPUTS</div>${inE.join('')}`:''}
  `;
}

cy.on('tap','node',function(e){
  const n=e.target;
  if(n.data('cat')==='bg') return;
  cy.elements().removeClass('highlighted faded selected');
  n.addClass('selected');
  const connected = n.connectedEdges();
  const neighbors = n.neighborhood().nodes();
  cy.elements('node[cat!="bg"]').not(n).not(neighbors).addClass('faded');
  cy.elements('edge').not(connected).addClass('faded');
  connected.addClass('highlighted');
  neighbors.addClass('highlighted');
  showPanel(n);
});

cy.on('tap',function(e){
  if(e.target===cy){
    cy.elements().removeClass('highlighted faded selected');
    document.getElementById('panel').innerHTML='<h2>Node Info</h2><p class="ph">Click any node to see MCAT-relevant details and connections</p>';
  }
});

// Filter buttons
const catVisible = {};
document.querySelectorAll('.btn[data-cat]').forEach(btn=>{
  const cat=btn.dataset.cat;
  catVisible[cat]=true;
  btn.addEventListener('click',()=>{
    catVisible[cat]=!catVisible[cat];
    btn.classList.toggle('on',catVisible[cat]);
    cy.nodes(`[cat="${cat}"]`).style('display',catVisible[cat]?'element':'none');
    cy.edges().forEach(e=>{
      const sc=cy.$('#'+e.data('source')).data('cat');
      const tc=cy.$('#'+e.data('target')).data('cat');
      const show=(catVisible[sc]!==false)&&(catVisible[tc]!==false);
      e.style('display',show?'element':'none');
    });
  });
});

document.querySelectorAll('.btn[data-action]').forEach(btn=>{

    if(btn.dataset.action==='fit') cy.fit(undefined,40);
    if(btn.dataset.action==='clear'){
      cy.elements().removeClass('highlighted faded selected');
      document.getElementById('panel').innerHTML='<h2>Node Info</h2><p class="ph">Click any node to see MCAT-relevant details and connections</p>';
    }

});
